name: iOS build (simulator, unsigned)

# Mac-less iOS development: GitHub's macOS runners provide Xcode. This
# workflow proves the app compiles against HotwireNative 1.3.0 and BOOTS in
# the iOS Simulator (smoke: launch + process alive + screenshot artifact).
# No signing involved — simulator builds don't need an Apple account.

on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for iOS Simulator (unsigned)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project FacturasFamilia.xcodeproj \
            -scheme FacturasFamilia \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tail -60

      - name: Boot simulator and smoke-test app launch
        working-directory: ios
        run: |
          set -euxo pipefail
          UDID=$(xcrun simctl list devices available --json | \
            python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print(next(dev['udid'] for k,v in d.items() if 'iOS' in k for dev in v if 'iPhone' in dev['name']))")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "FacturasFamilia.app" -path "*iphonesimulator*" | head -1)
          test -n "$APP_PATH"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" com.facturasfamilia.app

          # Give the shell time to render (it will show Hotwire's offline
          # error screen — no server in CI — which still proves the native
          # shell, HotwireNative, and the path configuration all initialize
          # without crashing).
          sleep 12
          xcrun simctl io "$UDID" screenshot smoke.png

          # Fail if the app process died after launch.
          xcrun simctl spawn "$UDID" launchctl list | grep -q "com.facturasfamilia.app" \
            || (echo "App process not running"; exit 1)

      - name: Upload smoke screenshot
        uses: actions/upload-artifact@v4
        with:
          name: simulator-smoke-screenshot
          path: ios/smoke.png
