name: ios
on:
  workflow_dispatch:
  push:
    paths:
      - "ios/**"
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: ios
        run: xcodegen generate
      - name: Build simulator unsigned
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build -project FacturasFamilia.xcodeproj -scheme FacturasFamilia -destination 'generic/platform=iOS Simulator' -configuration Debug CODE_SIGNING_ALLOWED=NO | tail -40
      - name: Simulator smoke test
        working-directory: ios
        run: |
          set -euxo pipefail
          UDID=$(xcrun simctl list devices available iPhone | grep -oE '[A-F0-9-]{36}' | head -1)
          test -n "$UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "FacturasFamilia.app" -path "*iphonesimulator*" | head -1)
          test -n "$APP_PATH"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" com.facturasfamilia.app
          sleep 12
          xcrun simctl io "$UDID" screenshot smoke.png
          xcrun simctl spawn "$UDID" launchctl list | grep -q "com.facturasfamilia.app"
      - name: Build device (arm64) unsigned
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build -project FacturasFamilia.xcodeproj -scheme FacturasFamilia -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO | tail -40
      - name: Package unsigned IPA
        working-directory: ios
        run: |
          set -euxo pipefail
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "FacturasFamilia.app" -path "*iphoneos*" | head -1)
          test -n "$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry FacturasFamilia-unsigned.ipa Payload
          ls -la FacturasFamilia-unsigned.ipa
      - name: Build RELEASE (arm64) unsigned + ATS production guard
        working-directory: ios
        run: |
          set -euxo pipefail
          xcodebuild build -project FacturasFamilia.xcodeproj -scheme FacturasFamilia -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO | tail -20
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "FacturasFamilia.app" -path "*Release-iphoneos*" | head -1)
          test -n "$APP_PATH"
          # GUARD: el build de PRODUCCIÓN no puede contener excepciones ATS.
          # Si Info-Debug.plist se filtrara a Release, este paso pone el CI
          # en rojo — el HTTP-para-LAN es exclusivo de builds de desarrollo
          # (cifrado en tránsito obligatorio en producción: Ley 81 / EE.UU.).
          if /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity" "$APP_PATH/Info.plist" 2>/dev/null; then
            echo "FALLO DE SEGURIDAD: el Info.plist de Release contiene NSAppTransportSecurity"
            exit 1
          fi
          echo "OK: Release sin excepciones ATS (HTTPS estricto)"
      - name: Upload smoke screenshot
        uses: actions/upload-artifact@v4
        with:
          name: simulator-smoke
          path: ios/smoke.png
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: FacturasFamilia-unsigned-ipa
          path: ios/FacturasFamilia-unsigned.ipa
