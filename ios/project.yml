# XcodeGen project definition — the .xcodeproj is GENERATED (in CI or on any
# Mac) from this file; we never hand-edit Xcode project files. This is what
# makes Mac-less iOS development workable: sources + this manifest live in
# git, GitHub's macOS runners run `xcodegen generate` + `xcodebuild`.
name: FacturasFamilia
options:
  bundleIdPrefix: com.facturasfamilia
  deploymentTarget:
    iOS: "15.0"

packages:
  HotwireNative:
    url: https://github.com/hotwired/hotwire-native-ios
    exactVersion: 1.3.0

targets:
  FacturasFamilia:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: HotwireNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.facturasfamilia.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        # Release plist: HTTPS estricto (sin excepciones ATS).
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          # Debug-only: permite HTTP hacia el rails server de la LAN para
          # pruebas en simulador/iPhone físico. Release NO hereda esto.
          INFOPLIST_FILE: Info-Debug.plist

schemes:
  FacturasFamilia:
    build:
      targets:
        FacturasFamilia: all
    run:
      config: Debug
    archive:
      config: Release
