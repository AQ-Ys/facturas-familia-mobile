# XcodeGen project definition — the .xcodeproj is GENERATED (in CI or on any
# Mac) from this file; we never hand-edit Xcode project files. This is what
# makes Mac-less iOS development workable: sources + this manifest live in
# git, GitHub's macOS runners run `xcodegen generate` + `xcodebuild`.
name: FacturasFamilia
options:
  bundleIdPrefix: com.facturasfamilia
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"

packages:
  HotwireNative:
    url: https://github.com/hotwired/hotwire-native-ios
    exactVersion: 1.3.0

targets:
  FacturasFamilia:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: HotwireNative
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Facturas Familia
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneController
        # App Transport Security: HTTPS-only, with ONLY the local-networking
        # relaxation (localhost / .local) for development against the local
        # Rails server. Arbitrary cleartext HTTP remains blocked in every
        # build — aligned with the backend's force_ssl and encryption-in-
        # transit expectations (Ley 81 Panamá / US state privacy laws).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.facturasfamilia.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        # CI builds for the simulator without signing; real-device signing
        # happens only when an Apple Developer account is wired in.
        CODE_SIGN_STYLE: Automatic

schemes:
  FacturasFamilia:
    build:
      targets:
        FacturasFamilia: all
    run:
      config: Debug
    archive:
      config: Release
